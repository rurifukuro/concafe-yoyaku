name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # vite.config reads VITE_* from .env files (loadEnv), which are gitignored,
      # so recreate it in CI. The anon key is a public, RLS-protected client key.
      - name: Create build env
        run: |
          cat > .env <<'EOF'
          VITE_SUPABASE_URL=https://rhmuitgbvilqwdevxxox.supabase.co
          VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJobXVpdGdidmlscXdkZXZ4eG94Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMTg1NTIsImV4cCI6MjA5Nzc5NDU1Mn0.-AFsrYH8SSv0CddNq12eNcUEDsQtthDr-L6xNw8JNas
          VITE_BASE_PATH=/concafe-yoyaku/
          EOF

      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
